<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>UP View</title>
    <meta name="description" content="Seu currículo profissional aqui por apenas 30 reais por mês!">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
        }

        header {
            width: 140px; 
            background-color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            text-align: center;
            border-right: 1px solid #333;
            position: fixed;
            left: 0;
            top: 0;
        }

        .loaden {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            margin-bottom: 25px;
        }
        
        .loaden:hover { transform: rotate(360deg); }

        .logo-img {
            border-radius: 50%;
            box-shadow: 0px 0px 20px blueviolet;
            height: 70px;
            width: 70px;
            object-fit: cover;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .brand-icon {
            height: 80px;
            width: auto;
            margin-bottom: 5px;
            filter: drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.5));
        }

        h1 {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ececec;
            filter: drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.5));
        }

        .credits {
            font-size: 0.65rem;
            color: gray;
            margin-top: 5px;
            margin-bottom: auto;
        }

        .contato {
            color: white;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, blueviolet, #6a11cb);
            padding: 12px 5px;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .contato:hover {
            transform: translate(-3px, -3px);
            box-shadow: 5px 5px 13px rgb(97, 0, 187);
        }

        main {
            margin-left: 140px;
            padding: 40px;
            width: 100%;
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .user-button {
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: capitalize;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .user-button:hover {
            background-color: #252525;
            border-color: blueviolet;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .user-button::before {
            content: '👤';
            font-size: 2rem;
            display: block;
        }

        h2 {
            margin-bottom: 10px;
            color: blueviolet;
        }
    </style>
</head>
<body>
    <header>
        <a href="https://loaden.vercel.app" class="loaden">
            <img src="Logo.png" alt="Logo Loaden" class="logo-img">
        </a>

        <div class="brand-container">
            <img src="favicon.ico" class="brand-icon" alt="UP Icon">
            <h1>View</h1>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; width: 60%; margin-bottom: 10px;">
        
        <p class="credits">Made by <span style="color: blueviolet; font-weight: 600;">Loaden</span></p>
        
        <a href="https://wa.me/5519999669630?text=Olá!%20Eu%20gostaria%20de%20por%20meu%20currículo%20para%20exibição!" 
           target="_blank" 
           class="contato">
           CONTATO
        </a>
    </header>

    <main>
        <h2>Currículos</h2>
        <p>Selecione uma pessoa para visualizar o currículo:</p>
        
        <div class="user-grid" id="userContainer"></div>
    </main>

    <script>
        const users = ['Modelo'];
        const container = document.getElementById('userContainer');

        users.forEach(user => {
            const btn = document.createElement('a');
            btn.href = `users/${user}.html`;
            btn.className = 'user-button';
            
            const displayName = user.replace(/_/g, ' ').replace(/-/g, ' ');
            btn.innerText = displayName;

            container.appendChild(btn);
        });
    </script>
</body>
</html>
